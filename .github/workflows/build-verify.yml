# build-verify
#
# This SDK package does not deploy to Railway, so there is no Dockerfile
# to mirror. Instead, build-verify catches the equivalent fail-fast
# signal: lockfile drift, type errors, test failures, or a broken
# library build.
#
# The job name is intentionally `build-verify` so it can be referenced
# verbatim as a `required_status_checks` context on branch protection
# for `main`.
name: build-verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-verify:
    name: build-verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

      - name: typecheck
        run: |
          if node -e "process.exit(Object.keys(require('./package.json').scripts || {}).includes('typecheck') ? 0 : 1)"; then
            pnpm typecheck
          else
            pnpm exec tsc --noEmit
          fi

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build